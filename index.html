<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximamente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0.85;
        }

        .newsletter {
            margin-top: 2rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            max-width: 400px;
            margin: 0 auto;
        }

        input[type="email"] {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
        }

        button {
            padding: 1rem 2rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .social-links {
            margin-top: 3rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .social-links a {
            color: white;
            font-size: 1.5rem;
            transition: transform 0.3s ease;
            text-decoration: none;
        }

        .social-links a:hover {
            transform: scale(1.2);
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) translateX(0);
            }

            25% {
                transform: translateY(-100px) translateX(50px);
            }

            50% {
                transform: translateY(-200px) translateX(-50px);
            }

            75% {
                transform: translateY(-100px) translateX(100px);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .input-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 5px;
            display: none;
        }

        .message.success {
            background: rgba(76, 175, 80, 0.3);
            display: block;
        }
    </style>
</head>

<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1>Próximamente</h1>
        <p class="subtitle">Algo increíble está en camino</p>
        <p class="description">
            Estamos trabajando duro para traerte algo especial.
            Suscríbete para ser el primero en enterarte cuando lancemos.
        </p>

        <div class="newsletter">
            <form id="newsletterForm" class="input-group">
                <input type="email" placeholder="Tu correo electrónico" required id="emailInput">
                <button type="submit">Notificarme</button>
            </form>
            <div class="message" id="message">
                ¡Gracias! Te notificaremos cuando estemos listos.
            </div>
        </div>

        <div class="social-links">
            <a href="#" title="Facebook">📘</a>
            <a href="#" title="Twitter">🐦</a>
            <a href="#" title="Instagram">📷</a>
            <a href="#" title="LinkedIn">💼</a>
        </div>
    </div>

    <script>
        // Crear partículas animadas
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 100 + 50 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.animationDuration = Math.random() * 10 + 10 + 's';
            particlesContainer.appendChild(particle);
        }

        // Manejar el formulario
        document.getElementById('newsletterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('emailInput').value;
            const message = document.getElementById('message');

            // 1. Enviamos a tu servidor (para la lista en la web)
            fetch('/suscribirse', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            // 2. Enviamos la notificación a tu Email (vía Formspree)
            // He usado un servicio que mandará el correo a tu cuenta chessdrez71@gmail.com
            fetch("https://formsubmit.co/ajax/chessdrez71@gmail.com", {
                method: "POST",
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    mensaje: "¡Nueva suscripción en Chessdrez!",
                    _subject: "Novedades Chessdrez: Nuevo Suscriptor"
                })
            })
                .then(res => {
                    message.textContent = "¡Gracias! Te avisaremos a " + email;
                    message.classList.add('success');
                    document.getElementById('emailInput').value = '';
                    setTimeout(() => { message.classList.remove('success'); }, 5000);
                })
                .catch(err => {
                    console.error('Error:', err);
                    message.textContent = "Te hemos anotado, ¡gracias!";
                    message.classList.add('success');
                });
        });
    </script>
</body>

</html>
